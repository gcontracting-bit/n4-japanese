var LESSON_TITLES = {"13": "Potential & Reasons", "14": "Wants & Giving/Receiving", "15": "Volitional & Intentions", "16": "Favors & Conditionals", "17": "Hearsay & たら", "18": "Transitivity & てしまう", "19": "Honorifics", "20": "Humble Speech", "21": "Passive", "22": "Causative", "23": "Causative-Passive"};

// Build the shared word list once and publish it so the dashboard vocab wheel
// can compute mastery LIVE (same VocabProgress.compute the bar below uses).
var WORD_LIST = VOCAB.map(function(w){
    return { kana:w.kana, kanji: w.kanji? [w.kanji]:[], en:w.en, extra:false, ch:'l'+w.lesson };
});
try { localStorage.setItem('n4_vocab_word_list', JSON.stringify(WORD_LIST)); } catch(e){}

function getScores(){ try { return JSON.parse(localStorage.getItem('n4_vocab_scores')||'{}'); } catch(e){ return {}; } }
function getKanjiScores(){ try { return JSON.parse(localStorage.getItem('n4_kanji_scores')||'{}'); } catch(e){ return {}; } }

function wordStatus(w, scores, kanjiScores){
    // Best status across the word's forms (kana form + kanji form).
    var VP = window.VocabProgress;
    var best = 'untested';
    var rank = {red:0, amber:1, untested:2, green:3};
    function consider(st){ if(rank[st] > rank[best]) best = st; }
    if (VP) {
        consider(VP.formStatus(w.kana, w.en, scores, kanjiScores, false));
        if (w.kanji) consider(VP.formStatus(w.kanji, w.en, scores, kanjiScores, true));
    }
    return best;
}

function render(){
    var scores=getScores(), kanjiScores=getKanjiScores();
    var host=document.getElementById('lessons'); host.innerHTML='';
    var lessons=[]; VOCAB.forEach(function(w){ if(lessons.indexOf(w.lesson)===-1) lessons.push(w.lesson); });
    lessons.forEach(function(L){
        var items=VOCAB.filter(function(w){return w.lesson===L;});
        var greenN=0;
        var sec=document.createElement('div'); sec.className='lesson-section';
        var head=document.createElement('div'); head.className='section-header collapsed';
        var body=document.createElement('div'); body.className='section-content collapsed';
        var tbl=document.createElement('table'); tbl.className='vocab';
        tbl.innerHTML='<thead><tr><th>Reading</th><th>Kanji</th><th>Meaning</th><th></th></tr></thead>';
        var tb=document.createElement('tbody');
        items.forEach(function(w){
            var st=wordStatus(w,scores,kanjiScores);
            if(st==='green') greenN++;
            var tr=document.createElement('tr'); if(st==='green') tr.className='green';
            tr.innerHTML='<td class="kana">'+w.kana+'</td><td class="kanji">'+(w.kanji||'—')+'</td><td>'+w.en+'</td><td class="status"><span class="dot '+st+'"></span></td>';
            tb.appendChild(tr);
        });
        tbl.appendChild(tb); body.appendChild(tbl);
        head.innerHTML='<span class="toggle-arrow">▶</span><span class="sh-title">Lesson '+L+': '+(LESSON_TITLES[L]||'')+'</span><span class="sh-count">'+greenN+'/'+items.length+' words</span>';
        head.addEventListener('click', function(){ body.classList.toggle('collapsed'); this.querySelector('.toggle-arrow').textContent = body.classList.contains('collapsed')?'▶':'▼'; });
        sec.appendChild(head); sec.appendChild(body); host.appendChild(sec);
    });
    updateBar(scores,kanjiScores);
}

function updateBar(scores,kanjiScores){
    var VP=window.VocabProgress;
    if(VP && VP.compute){
        var r=VP.compute(WORD_LIST, scores, kanjiScores);
        var pct=r.total>0? Math.round((r.mastered/r.total)*100):0;
        document.getElementById('progress-fill').style.width=pct+'%';
        document.getElementById('mastery-count').textContent=r.mastered+' / '+r.total+' forms ('+pct+'%)';
    }
}

function expandAll(){ document.querySelectorAll('.section-content').forEach(c=>c.classList.remove('collapsed')); document.querySelectorAll('.toggle-arrow').forEach(a=>a.textContent='▼'); }
function collapseAll(){ document.querySelectorAll('.section-content').forEach(c=>c.classList.add('collapsed')); document.querySelectorAll('.toggle-arrow').forEach(a=>a.textContent='▶'); }

render();
window.addEventListener('cloudsync:ready', render);
window.addEventListener('cloudsync:update', function(e){ if(!e.detail || e.detail.key==='n4_vocab_scores' || e.detail.key==='n4_kanji_scores') render(); });
</script>
